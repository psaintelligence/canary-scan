
# Navigation
# ===
nav:
  - Canary Scan:
    - Home: index.md
    - Install: install.md
    - Workflow: workflow.md
    - File Types: file-types.md
    - Commands:
      - scan: command/scan.md
      - stage: command/stage.md
      - report: command/report.md
      - deps: command/deps.md
    - Other:
      - project.md
      - license.md
  - GitHub: https://github.com/psaintelligence
  - PSA Intelligence: https://www.psaintelligence.com

exclude_docs: |
  !.github


# Site
# ===
docs_dir: docs
site_name: PSA Intelligence Canary Scan
site_url: https://psaintelligence.github.io/canary-scan/
site_author: PSA Intelligence Pte Ltd
site_description: Scan document data-sources for canaries, trackers, web beacons, and fingerprints


# Repo
# ===
repo_url: https://github.com/psaintelligence/canary-scan
repo_name: psaintelligence/canary-scan


# Copyright
# ===
copyright: Copyright &copy; 2026 PSA Intelligence Pte Ltd


# Theme
# ===
theme:
  name: material
  language: en

  palette:
    - scheme: default
      primary: amber
      accent: amber

  font:
    text: Roboto
    code: Roboto Mono

  logo: assets/img/canary-scan-logo.png
  favicon: assets/img/canary-scan-icon-128x128.png

  features:
    - navigation.expand         # When expansion is enabled, the left sidebar will expand all collapsible subsections by default, so the user doesn't have to open subsections manually
    #- navigation.sections       # When sections are enabled, top-level sections are rendered as groups in the sidebar for viewports above 1220px, but remain as-is on mobile.
    - navigation.top            # A back-to-top button can be shown when the user, after scrolling down, starts to scroll up again. It's rendered centered and just below the header.
    - navigation.tabs           # When tabs are enabled, top-level sections are rendered in a menu layer below the header for viewports above 1220px, but remain as-is on mobile.
    - navigation.tabs.sticky    # When sticky tabs are enabled, navigation tabs will lock below the header and always remain visible when scrolling down.
    - search.highlight

# Additional configuration
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/psaintelligence/canary-scan
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/canary-scan/


# Extras
# ===
extra_css:
  - assets/css/extra.css
extra_javascript:
  - assets/js/extra.js


# Plugins
# ===
plugins:
  - search
  - redirects:
      redirect_maps:
        #old-path/index.md: new-path/index.md
  - minify:
      minify_js: true
      minify_css: true
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../src]
          options:
            heading_level: 3
            show_root_heading: true
            show_root_full_path: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta

  - toc:
      permalink: true

  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde

  - pymdownx.arithmatex:
      generic: true

  - pymdownx.betterem:
      smart_enable: all

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.emoji:  # https://squidfunk.github.io/mkdocs-material/reference/icons-emojis
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

#  - pymdownx.magiclink:
#      repo_url_shorthand: true
#      user: squidfunk
#      repo: mkdocs-material

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true
